name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: lucasrds401
          outputs: dist/snake.svg

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist
